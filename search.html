<script>

function runSearch(){
  let q=document.getElementById("searchInput").value;
  window.location="search.html?q="+encodeURIComponent(q);
}

window.onload=function(){

const params=new URLSearchParams(window.location.search);
const query=(params.get("q") || "").toLowerCase();

document.getElementById("searchInput").value=query;

function normalize(text){
  return text.toLowerCase().replace(/_/g," ").replace(/[^a-z0-9 ]/g,"");
}

fetch("gyani_index.json")
.then(response=>response.json())
.then(data=>{

let resultsDiv=document.getElementById("results");
resultsDiv.innerHTML="";

let q=normalize(query);

data.forEach(page=>{

let title=normalize(page.title);
let desc=normalize(page.description || "");

/* fuzzy matching */
if(
  title.includes(q) ||
  desc.includes(q) ||
  title.split(" ").some(w => q.includes(w)) ||
  q.split(" ").some(w => title.includes(w))
){

resultsDiv.innerHTML+=`
<div class="result">
<a href="${page.url}" target="_blank">${page.title}</a>
<p>${page.description}</p>
</div>
`;

}

});

})
.catch(err=>{
document.getElementById("results").innerHTML="Search database error.";
});

}

</script>
