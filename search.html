<script>

const params = new URLSearchParams(window.location.search);
const query = (params.get("q") || "").toLowerCase();

document.getElementById("searchInput").value = query;

function runSearch(){
  const q = document.getElementById("searchInput").value;
  window.location = "search.html?q=" + encodeURIComponent(q);
}

/* normalize text */
function normalize(text){
  return text
    .toLowerCase()
    .replace(/_/g," ")
    .replace(/[^a-z0-9 ]/g,"");
}

/* simple similarity check */
function similar(a,b){

  if(a.includes(b)) return true;
  if(b.includes(a)) return true;

  const wordsA = a.split(" ");
  const wordsB = b.split(" ");

  for(let w1 of wordsA){
    for(let w2 of wordsB){
      if(w1.startsWith(w2) || w2.startsWith(w1)){
        return true;
      }
    }
  }

  return false;
}

fetch("gyani_index.json")
.then(r=>r.json())
.then(data=>{

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML="";

  const q = normalize(query);

  let found = false;

  data.forEach(page=>{

    const title = normalize(page.title);
    const desc = normalize(page.description || "");

    if(
      similar(title,q) ||
      similar(desc,q)
    ){

      found = true;

      resultsDiv.innerHTML += `
      <div class="result">
        <a href="${page.url}" target="_blank">${page.title}</a>
        <p>${page.description}</p>
      </div>`;
    }

  });

  if(!found){
    resultsDiv.innerHTML = "<p>No results found yet. Try different words.</p>";
  }

});

</script>
