<!DOCTYPE html>
<html>
<head>

<title>GYANI Results</title>

<style>

body{
background:#020b14;
font-family:Arial;
color:white;
padding:40px;
}

.result{
background:#0f1c2c;
padding:20px;
margin-bottom:15px;
border-radius:10px;
}

.result a{
color:#ffa500;
font-size:20px;
text-decoration:none;
}

</style>

</head>

<body>

<h1>GYANI Search Results</h1>

<div id="results"></div>

<script>

const params=new URLSearchParams(window.location.search);
const query=(params.get("q")||"").toLowerCase();

fetch("gyani_index.json")
.then(r=>r.json())
.then(data=>{

let results=document.getElementById("results");

data.forEach(page=>{

let title=page.title.toLowerCase();

if(
title.includes(query) ||
query.split(" ").some(word=>title.includes(word))
){

results.innerHTML+=`
<div class="result">
<a href="${page.url}" target="_blank">${page.title}</a>
<p>${page.description}</p>
</div>
`;

}

});

});

</script>

</body>
</html>
