<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>GYANI AI Search</title>

<style>

body{
background:#020b14;
font-family:Arial;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
color:#00eaff;
}

.searchbar{
width:100%;
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
margin-bottom:20px;
}

button{
background:#f9a602;
border:none;
padding:12px 20px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.ai-box{
background:#0c1622;
border:1px solid #2c3e50;
padding:20px;
border-radius:12px;
margin-bottom:30px;
box-shadow:0 0 20px rgba(0,200,255,0.2);
}

.ai-box h2{
color:#00eaff;
}

.result{
background:#0f1c2c;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.result a{
color:#ffa500;
font-size:20px;
text-decoration:none;
}

.result p{
color:#9fb3c8;
}

</style>

</head>

<body>

<div class="container">

<h1>GYANI AI Search</h1>

<input class="searchbar" id="searchInput">

<button onclick="runSearch()">Search</button>

<div class="ai-box">
<h2>🧠 GYANI AI Answer</h2>
<p id="aiText">Analyzing scientific sources...</p>
</div>

<div id="results"></div>

</div>

<script>

const params=new URLSearchParams(window.location.search);
const query=params.get("q") || "";

document.getElementById("searchInput").value=query;

function runSearch(){
let q=document.getElementById("searchInput").value;
window.location="search.html?q="+encodeURIComponent(q);
}

fetch("gyani_index.json")
.then(res=>res.json())
.then(data=>{

let resultsDiv=document.getElementById("results");
resultsDiv.innerHTML="";

let results=[];

data.forEach(page=>{

if(
page.title.toLowerCase().includes(query.toLowerCase()) ||
(page.keywords && page.keywords.includes(query.toLowerCase()))
){
results.push(page);
}

});

generateAIAnswer(query);

results.forEach(page=>{
resultsDiv.innerHTML+=`
<div class="result">
<a href="${page.url}" target="_blank">${page.title}</a>
<p>${page.description}</p>
</div>
`;
});

});

function generateAIAnswer(query){

let text="";
query=query.toLowerCase();

if(query.includes("black hole")){
text="A black hole is a region of spacetime where gravity becomes so strong that nothing, not even light, can escape.";
}

else if(query.includes("dna")){
text="DNA carries the genetic instructions used in growth, development, and reproduction of living organisms.";
}

else if(query.includes("galaxy")){
text="A galaxy is a massive system of stars, gas, dust, and dark matter bound together by gravity.";
}

else if(query.includes("atom")){
text="An atom is the smallest unit of matter that retains the properties of a chemical element.";
}

else{
text="GYANI AI is analyzing scientific sources related to '"+query+"' and presenting relevant knowledge links.";
}

document.getElementById("aiText").innerText=text;

}

</script>

</body>
</html>
