<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>GYANI</title>

<style>

body{
background:#020b14;
font-family:Arial;
color:white;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
width:500px;
}

.logo{
width:130px;
margin-bottom:30px;
}

.searchbar{
width:100%;
padding:15px;
font-size:18px;
border-radius:25px;
border:none;
margin-bottom:20px;
}

button{
background:#f9a602;
border:none;
padding:12px 25px;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<img src="gyani-logo.png" class="logo">

<input class="searchbar" id="searchInput"
placeholder="Search physics, biology, chemistry, cosmology">

<br>

<button onclick="searchGyani()">Search</button>

</div>

<script>

function searchGyani(){

let q=document.getElementById("searchInput").value;

window.location="search.html?q="+encodeURIComponent(q);

}

</script>

</body>
</html>
